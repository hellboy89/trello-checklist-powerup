<html>
<head>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
  var BUILD_TIME = '2026-04-23T02:30:00';

  function buildFrontBadge(total, completed) {
    if (total === 0) return [];

    var pending = total - completed;
    var pct = Math.round((completed / total) * 100);
    var text, color;

    if (pending === 0) {
      text = 'Tudo feito!';
      color = 'green';
    } else if (pct === 0) {
      text = '⚠ NADA MARCADO!';
      color = 'red';
    } else if (pct >= 50) {
      text = pending + ' pendente' + (pending > 1 ? 's' : '');
      color = 'yellow';
    } else {
      text = pending + ' pendente' + (pending > 1 ? 's' : '');
      color = 'orange';
    }

    return [{
      title: completed + '/' + total + ' itens concluidos (' + pct + '%)',
      text: text,
      color: color,
      refresh: 10
    }];
  }

  TrelloPowerUp.initialize({

    // Usa card.badges que sempre está disponível para TODOS os cartões
    'card-badges': function(t) {
      return t.card('badges').then(function(card) {
        var b = card.badges;
        if (!b || !b.checkItems) return [];
        return buildFrontBadge(b.checkItems, b.checkItemsChecked || 0);
      });
    },

    // Dentro do cartão: detalha por checklist (dados completos disponíveis ao abrir)
    'card-detail-badges': function(t) {
      return t.card('checklists').then(function(card) {
        var checklists = card.checklists;
        if (!checklists || checklists.length === 0) return [];

        return checklists.map(function(cl) {
          var items = cl.checkItems || [];
          var total = items.length;
          var completed = items.filter(function(i) {
            return i.state === 'complete';
          }).length;
          var pct = total > 0 ? Math.round((completed / total) * 100) : 0;

          var color;
          if (completed === total && total > 0) color = 'green';
          else if (pct >= 50) color = 'yellow';
          else if (pct > 0)   color = 'orange';
          else                color = 'red';

          return {
            title: cl.name,
            text: cl.name + ': ' + completed + '/' + total + ' (' + pct + '%)',
            color: color,
            refresh: 10
          };
        });
      });
    }

  });
</script>
</body>
</html>
