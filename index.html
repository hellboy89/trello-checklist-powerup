<html>
<head>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
  // ↓ Sua chave da API Trello — obtenha em: https://trello.com/app-key
  var APP_KEY = 'ce51da389c07fbf1240dfd96fb248b8d';

  function buildFrontBadge(total, completed) {
    if (total === 0) return [];

    var pending = total - completed;
    var pct = Math.round((completed / total) * 100);
    var text, color;

    if (pending === 0) {
      text = 'Tudo feito!';
      color = 'green';
    } else if (pct === 0) {
      text = '⚠ NADA MARCADO!';
      color = 'red';
    } else if (pct >= 50) {
      text = pending + ' pendente' + (pending > 1 ? 's' : '');
      color = 'yellow';
    } else {
      text = pending + ' pendente' + (pending > 1 ? 's' : '');
      color = 'orange';
    }

    return [{
      title: completed + '/' + total + ' itens concluidos (' + pct + '%)',
      text: text,
      color: color,
      refresh: 10
    }];
  }

  TrelloPowerUp.initialize({

    'board-buttons': function(t) {
      return [{
        text: 'Colorir Listas',
        callback: function(t) {
          return t.board('id').then(function(b) {
            return t.popup({
              title: 'Colorir Listas por Nome',
              url: './set-colors.html?boardId=' + b.id,
              height: 160
            });
          });
        }
      }];
    },

    // Usa card.badges que sempre está disponível para TODOS os cartões
    'card-badges': function(t) {
      return t.card('badges').then(function(card) {
        var b = card.badges;
        if (!b || !b.checkItems) return [];
        return buildFrontBadge(b.checkItems, b.checkItemsChecked || 0);
      });
    },

    // Dentro do cartão: detalha por checklist (dados completos disponíveis ao abrir)
    'card-detail-badges': function(t) {
      return t.card('checklists').then(function(card) {
        var checklists = card.checklists;
        if (!checklists || checklists.length === 0) return [];

        return checklists.map(function(cl) {
          var items = cl.checkItems || [];
          var total = items.length;
          var completed = items.filter(function(i) {
            return i.state === 'complete';
          }).length;
          var pct = total > 0 ? Math.round((completed / total) * 100) : 0;

          var color;
          if (completed === total && total > 0) color = 'green';
          else if (pct >= 50) color = 'yellow';
          else if (pct > 0)   color = 'orange';
          else                color = 'red';

          return {
            title: cl.name,
            text: cl.name + ': ' + completed + '/' + total + ' (' + pct + '%)',
            color: color,
            refresh: 10
          };
        });
      });
    }

  }, {
    appKey: APP_KEY,
    appName: 'Checklist PowerUp'
  });
</script>
<script>var BUILD_TIME="23/04/2026 01:50";</script>
<div style="font-family:sans-serif;font-size:11px;color:#888;padding:6px 10px;position:fixed;bottom:0;left:0;background:#f5f5f5;border-top:1px solid #ddd;border-right:1px solid #ddd;border-top-right-radius:6px;">
  &#128337; Último deploy: <strong id="build-time"></strong>
</div>
<script>document.getElementById('build-time').textContent=BUILD_TIME;</script>
</body>
</html>
