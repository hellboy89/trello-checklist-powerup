<html>
<head>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 12px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #172b4d;
    }
    p { margin: 0 0 8px; color: #5e6c84; line-height: 1.4; }
    a { color: #0052cc; }
    input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #dfe1e6;
      border-radius: 3px;
      font-size: 13px;
      margin: 6px 0 8px;
    }
    input:focus { outline: none; border-color: #0052cc; }
    .btn-primary {
      background: #0052cc;
      color: white;
      border: none;
      border-radius: 3px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
    }
    .btn-primary:hover { background: #0065ff; }
    .btn-primary:disabled { background: #a5adba; cursor: not-allowed; }
    .btn-link {
      background: none;
      border: none;
      color: #5e6c84;
      font-size: 11px;
      cursor: pointer;
      padding: 4px 0 0;
      text-decoration: underline;
    }
    .btn-link:hover { color: #172b4d; }
    #status { margin-top: 8px; font-size: 12px; min-height: 16px; }
    #status.ok  { color: #006644; }
    #status.err { color: #ae2e24; }
  </style>
</head>
<body>
  <div id="content">

    <!-- Tela 1: pedir token -->
    <div id="tela-token">
      <p><b>1.</b> Clique no link abaixo para gerar um token de acesso no Trello:</p>
      <a id="link-auth" href="#" target="_blank">Gerar token de acesso &rarr;</a>
      <p style="margin-top:8px"><b>2.</b> Copie o token gerado e cole aqui:</p>
      <input id="input-token" type="text" placeholder="Cole o token aqui..." />
      <button class="btn-primary" id="btn-salvar">Salvar e Aplicar Cores</button>
    </div>

    <!-- Tela 2: já tem token -->
    <div id="tela-aplicar" style="display:none">
      <p>Cores configuradas: pessoal (azul), trabalho (vermelho), em andamento (amarelo), finalizado (verde), lixeira (sem cor).</p>
      <button class="btn-primary" id="btn-aplicar">Aplicar Cores</button>
      <br>
      <button class="btn-link" id="btn-trocar">Trocar token de acesso</button>
    </div>

    <div id="status"></div>
  </div>

  <script>
    var APP_KEY = 'ce51da389c07fbf1240dfd96fb248b8d';

    var AUTH_URL = 'https://trello.com/1/authorize'
      + '?expiration=never'
      + '&scope=read,write'
      + '&response_type=token'
      + '&name=ColorirListas'
      + '&key=' + APP_KEY;

    var MAPA_CORES = {
      'pessoal':      'sky',
      'trabalho':     'red',
      'em andamento': 'yellow',
      'finalizado':   'green',
      'lixeira':      ''
    };

    var boardId = new URLSearchParams(location.search).get('boardId');

    var t = TrelloPowerUp.iframe();

    function corDaLista(nome) {
      var lower = (nome || '').toLowerCase().trim();
      for (var chave in MAPA_CORES) {
        if (lower.indexOf(chave) !== -1) return { ok: true, cor: MAPA_CORES[chave] };
      }
      return { ok: false };
    }

    function setStatus(msg, cls) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = cls || '';
    }

    function mostrarTelaToken() {
      document.getElementById('link-auth').href = AUTH_URL;
      document.getElementById('tela-token').style.display = 'block';
      document.getElementById('tela-aplicar').style.display = 'none';
      setStatus('');
      t.sizeTo('#content');
    }

    function mostrarTelaAplicar() {
      document.getElementById('tela-token').style.display = 'none';
      document.getElementById('tela-aplicar').style.display = 'block';
      setStatus('');
      t.sizeTo('#content');
    }

    function aplicarCores(token) {
      document.getElementById('btn-aplicar').disabled = true;
      setStatus('Validando token...');

      fetch('https://api.trello.com/1/members/me?key=' + APP_KEY + '&token=' + token)
        .then(function(r) {
          if (r.status === 401) throw new Error('TOKEN_INVALIDO');
          if (!r.ok) throw new Error('Falha na validacao: HTTP ' + r.status);
          if (!boardId) throw new Error('ID do quadro nao encontrado. Feche e reabra o popup.');
          setStatus('Buscando listas...');
          return fetch('https://api.trello.com/1/boards/' + boardId + '/lists?key=' + APP_KEY + '&token=' + token);
        })
        .then(function(r) {
          if (!r.ok) throw new Error('Erro ao buscar listas: HTTP ' + r.status);
          return r.json();
        })
        .then(function(lists) {
          setStatus('Aplicando cores...');
          var count = 0;
          var ps = lists.map(function(lista) {
            var r = corDaLista(lista.name);
            if (!r.ok) return Promise.resolve();
            count++;
            var url = 'https://api.trello.com/1/lists/' + lista.id
                    + '?key=' + APP_KEY
                    + '&token=' + token
                    + '&color=' + r.cor;
            return fetch(url, { method: 'PUT' });
          });
          return Promise.all(ps).then(function() { return count; });
        })
        .then(function(count) {
          setStatus(count + ' lista(s) colorida(s)! Recarregue a pagina para ver.', 'ok');
          document.getElementById('btn-aplicar').disabled = false;
        })
        .catch(function(err) {
          if (err.message === 'TOKEN_INVALIDO') {
            setStatus('Token invalido. Clique em "Trocar token de acesso".', 'err');
            t.remove('member', 'private', 'trelloToken');
          } else {
            setStatus('Erro: ' + err.message, 'err');
          }
          document.getElementById('btn-aplicar').disabled = false;
        });
    }

    // Inicializa verificando se já tem token salvo
    t.get('member', 'private', 'trelloToken').then(function(token) {
      if (token) {
        mostrarTelaAplicar();
      } else {
        mostrarTelaToken();
      }
    });

    document.getElementById('btn-salvar').addEventListener('click', function() {
      var token = document.getElementById('input-token').value.trim();
      if (!token) {
        setStatus('Cole o token no campo acima.', 'err');
        return;
      }
      t.set('member', 'private', 'trelloToken', token).then(function() {
        mostrarTelaAplicar();
        aplicarCores(token);
      });
    });

    document.getElementById('btn-aplicar').addEventListener('click', function() {
      t.get('member', 'private', 'trelloToken').then(aplicarCores);
    });

    document.getElementById('btn-trocar').addEventListener('click', function() {
      t.remove('member', 'private', 'trelloToken').then(mostrarTelaToken);
    });
  </script>
</body>
</html>
